services:
  php:
    build: .
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php